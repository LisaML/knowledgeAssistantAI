<section class="chat-page">

  <div class="chat-card">

    <h1>Chat con Gemini AI</h1>

    <p>
      Haz preguntas sobre la información registrada en la plataforma.
    </p>

    <textarea
      rows="5"
      [(ngModel)]="question"
      placeholder="Ejemplo: ¿Qué registros hablan sobre calidad?">
    </textarea>

    <br><br>

    <button
      (click)="ask()"
      [disabled]="loading">

      {{ loading ? 'Consultando...' : 'Preguntar' }}

    </button>

    <div class="response" *ngIf="answer">

      <h2>Respuesta de Gemini</h2>

      <p>
        {{ answer }}
      </p>

    </div>

  </div>

</section>
